# Exsys USB Hub — ROS2 노드 파라미터
#
# 노드 이름(exsys_hub_node)과 키가 일치해야 적용된다.
# 현장 튜닝은 소스 수정 없이 이 파일만 고치면 된다.
exsys_hub_node:
  ros__parameters:
    device_path: /dev/exsys_hub   # setup.sh 가 만든 udev 심링크
    baudrate: 9600                # 장치 고정값
    timeout: 2.0                  # 시리얼 읽기 타임아웃(초)
    poll_rate_hz: 1.0             # 상태 폴링 주기
    protected_ports: [1]          # OFF 를 거부할 포트 (예: 메인 컴퓨트)
    inrush_delay_ms: 500          # OFF→ON 사이 최소 대기(ms)
    verify_retries: 2             # set 후 read-back 검증 재시도
    port_names:                   # 진단/표시용 라벨 (포트 순서대로)
      - "Compute"
      - "Camera"
      - "LiDAR"
      - "Dongle"
